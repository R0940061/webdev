<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Opdracht 6.1: Producten</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

<table>

        <th>producten</th>
        <th>prijs</th>
        <th>aantal</th>

        <th>subtotaal</th>
    </tr>
    <tr>
        <td>product1</td>

        <td class="subtotaal">0.00 Eur</td>
    </tr>
    <tr>
        <td>product2</td>
        <td class="prijs">15.00 Eur</td>
        <td><input type="number" class="aantal" value="0"></td>
        <td class="btw">21%</td>
        <td class="subtotaal">0.00 Eur</td>
    </tr>
    <tr>
        <td>product3</td>
        <td class="prijs">12.20 Eur</td>
        <td><input type="number" class="aantal" value="0"></td>
        <td class="btw">21%</td>
        <td class="subtotaal">0.00 Eur</td>
    </tr>
    <tr>
        <td colspan="4">totaal</td>
        <td id="totaalVeld">0.00 Eur</td>
    </tr>
</table>

<button id="btnHerbereken">Herbereken</button>

<script src="scripts/script.js"></script>

</html>
