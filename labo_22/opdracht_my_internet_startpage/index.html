<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Internet Startpage</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <main class="container py-4">
    <section class="mb-4">
      <h1 class="mb-3">My internet startpage</h1>
      <div class="row g-2 align-items-stretch">
        <div class="col-12 col-md-9">
          <label for="commandInput" class="form-label">Zoekopdracht</label>
          <input
            id="commandInput"
            type="text"
            class="form-control"
            placeholder="/g webdesign"
            autocomplete="off"
          >
        </div>
        <div class="col-12 col-md-3 d-grid">
          <label class="form-label d-none d-md-block">&nbsp;</label>
          <button id="goButton" type="button" class="btn btn-primary">GO!</button>
        </div>
      </div>
    </section>

    <section>
      <h2 class="h4 mb-3">History</h2>
      <div id="historyGrid" class="row g-3"></div>
    </section>
  </main>

  <script src="scripts/script.js"></script>
</body>
</html>
